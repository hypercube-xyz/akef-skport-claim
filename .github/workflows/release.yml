name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GOTOOLCHAIN: local

defaults:
  run:
    shell: bash

jobs:
  release:
    name: GoReleaser
    if: github.repository == 'hypercube-xyz/akef-skport-claim'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true
          cache-dependency-path: go.sum

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            printf 'Unsupported release tag: %s\n' "${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Validate PowerShell installers
        shell: pwsh
        run: |
          $parseErrors = foreach ($script in 'scripts/install.ps1', 'scripts/uninstall.ps1') {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$tokens,
              [ref]$errors
            )
            $errors
          }
          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          ./scripts/install.ps1 -Help
          ./scripts/uninstall.ps1 -Help
          ./scripts/test-install.ps1

      - name: Verify source
        run: |
          set -euo pipefail

          go mod download
          go mod verify
          go mod tidy -diff
          test -z "$(gofmt -l .)"
          bash -n scripts/*.sh
          ./scripts/install.sh --help >/dev/null
          ./scripts/uninstall.sh --help >/dev/null
          ./scripts/check-repository.sh
          go vet ./...
          go test -count=1 ./...

      - name: Release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "v2.17.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
