name: Bug report
description: Report a reproducible problem without exposing secrets
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Never paste credentials, cookies, authorization headers, full config
        files, bot tokens, chat IDs, webhook URLs, or other secrets.

        Replace sensitive values with placeholders such as `<REDACTED>`.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe what happened and what you expected to happen.
      placeholder: |
        Actual behavior:
        Expected behavior:
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide minimal, safe steps using placeholders only.
      placeholder: |
        1. Run `akef-claim ...`
        2. ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Application version
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      description: Include only relevant logs after removing all secrets.
      render: text

  - type: checkboxes
    id: confirmation
    attributes:
      label: Security confirmation
      options:
        - label: I confirmed that this issue contains no credentials or other secrets.
          required: true
